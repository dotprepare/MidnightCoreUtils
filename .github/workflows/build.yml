name: Build & Test

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: corretto

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew compileKotlin --no-daemon

      - name: Run API tests
        run: ./gradlew :utils-api:test --no-daemon

      - name: Build JARs
        run: ./gradlew :midnightcoreutils:jar :utils-api:jar --no-daemon

      - name: Upload API JAR
        uses: actions/upload-artifact@v4
        with:
          name: utils-api
          path: utils-api/build/libs/*.jar

      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: midnightcoreutils
          path: midnightcoreutils/build/libs/*.jar
